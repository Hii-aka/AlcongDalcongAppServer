version: '3.8'
services:
  alcongdalcong-mysql:
    container_name: alcongdalcong-mysql
    image: mysql:latest
    
    volumes:
      - alcongdalcong_volume:/data
    ports:
      - '3311:3306'
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: alcongdalcong
    command:
      [ 
      'mysqld', 
      '--character-set-server=utf8mb4', 
      '--collation-server=utf8mb4_unicode_ci', 
      '--lower_case_table_names=1' 
      ]

volumes:
  alcongdalcong_volume: